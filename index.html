}

.btn-pdf:hover {

}

   /* 🔒 ইমেজ লক করার CSS */

<img src="https://uploads.onecompiler.io/44s55p666/1781875953224/17600.png"

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
  import { getFirestore, collection, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBnpyZxD7Ju7JQdNYTOnasAeiihDKS0bpI",
    authDomain: "australian-web-9a688.firebaseapp.com",
    projectId: "australian-web-9a688",
    storageBucket: "australian-web-9a688.appspot.com",
    messagingSenderId: "946515883281",
    appId: "1:946515883281:web:0837fe8a0c75e0f7ed08b0"
  };
  
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  window.doSearch = async () => {
    const inputId = document.getElementById("idBox").value.trim();
    const resultDiv = document.getElementById("result");
    const viewerDiv = document.getElementById("viewer");
    const cardContent = document.getElementById("cardContent");
    const pdfAction = document.getElementById("pdfAction");
    const searchBox = document.getElementById("searchBox");

    if(!inputId) {
      resultDiv.innerHTML = "<p class='error'>Please Privacy Notice: update your application form with accurate information (e.g., identification Number).</p>";
      return;
    }

resultDiv.innerHTML = "<p style='text-align:center;'>⌛ Please wait for your information (Checking -n) Progress...</p>";

    try {
      const snap = await getDocs(collection(db, "entries"));
      let found = null;
      
      snap.forEach(docSnap => {
        const d = docSnap.data();
        // Matching ID from input
        if(d.id === inputId) {
          found = { ...d, docId: docSnap.id };
        }
      });

      if(!found) {
        resultDiv.innerHTML = "<p class='error'><i class='fas fa-exclamation-triangle'></i> Visa Holder Search error! Your information is missing. Please Use the IRCC portal</p>";
        return;
      }

      // Increment views
      const docRef = doc(db, "entries", found.docId);
      await updateDoc(docRef, { views: (found.views || 0) + 1 });

      // Generate Current Timestamp for ' last checked'
      const now = new Date().toISOString();

      // UI Update as per Screenshot
      searchBox.style.display = "none";
      viewerDiv.style.display = "block";
      
      cardContent.innerHTML = `
        <div class="data-row">
          <div class="data-label">Latest Update: </div>
          <div class="data-value">${now}</div>
        </div>
        <div class="data-row">
          <div class="data-label">Surname Name: </div>
          <div class="data-value">${found.visaDetails || (found.title + '')}</div>
        </div>
        <div class="data-row">
          <div class="data-label">Date of Issue: </div>
          <div class="data-value">${found.grantDate || ''}</div>
        </div>
        <div class="data-row">
          <div class="data-label">Date of Expiry: </div>
          <div class="data-value">${found.expiryDate || ''}</div>
        </div>
        <div class="data-row">
          <div class="data-label">Visa/Types: </div>
          <div class="data-value">${found.visaClass || ''}</div>
        </div>
        <div class="data-row">
          <div class="data-value">${found.workEntitlement || ''}</div>
        </div>
      `;

      // Handle PDF logic
      if(found.link && found.link.toLowerCase().includes(".pdf")) {
        pdfAction.innerHTML = `
          <a href="${found.link}" target="_blank" class="btn-pdf">
            <i class="fas fa-file-pdf"></i> Open document
          </a>
        `;
      } else {
        pdfAction.innerHTML = `
          <div style="margin-top:15px; color:#888; font-size:13px; font-style:italic;">
            <i class="fas fa-info-circle"></i> Your application file is not online yet, and it may take some time. please Try again later.
          </div>
        `;
      }

    } catch (err) {
      console.error(err);
      resultDiv.innerHTML = "<p class='error'>Connection error. Please check your internet and documents, Please Try again later..</p>";
    }
  }
</script>
